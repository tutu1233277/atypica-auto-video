<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atypica 视频生成工具</title>
    <link rel="stylesheet" href="/tool/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="nav-rail" aria-label="主导航">
        <div class="rail-logo">
          <img src="/头像.png" alt="头像" class="rail-avatar" />
        </div>
        <div class="rail-items">
          <button class="rail-item active" type="button" data-section="generate">生成</button>
          <button class="rail-item" type="button" data-section="materials">素材</button>
        </div>
      </aside>

      <section class="workspace-shell">
        <header class="workspace-header">
          <div class="workspace-tabs">
            <span class="workspace-tab">图片生成（后续开放）</span>
            <span class="workspace-tab active">视频生成</span>
          </div>

          <div class="header-status" aria-label="当前状态">
            <span class="status-dot"></span>
            <span id="statusText">先选择功能，再生成 3 个脚本。</span>
          </div>
        </header>

        <section class="product-shell">
          <section class="chat-column" aria-label="脚本对话流程">
            <div class="chat-panel">
              <div class="chat-panel-body">
                <div id="chatStream" class="chat-stream"></div>
                <div id="composerZone" class="composer-slot"></div>
              </div>
            </div>
          </section>

          <aside class="stage-column" aria-label="视频生成与预览">
            <section class="stage-card">
              <div class="stage-head">
                <div class="stage-title-wrap">
                  <p class="eyebrow">视频生成</p>
                  <h2 id="scriptTitle">等待渲染视频</h2>
                </div>
                <div class="stage-head-meta">
                  <span id="stageMeta" class="preview-chip">等待脚本</span>
                </div>
              </div>

              <div class="stage-frame">
                <video id="previewVideo" muted loop playsinline controls></video>
                <div id="stageOverlay" class="stage-overlay"></div>
              </div>
            </section>
          </aside>
        </section>
      </section>
    </main>

    <input id="hookUploadInput" type="file" accept="video/mp4,video/quicktime,video/webm,.mp4,.mov,.webm" hidden />
    <script src="/tool/app.js"></script>
  </body>
</html>
